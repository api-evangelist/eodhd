naftiko: 1.0.0-alpha2
info:
  label: EODHD End-Of-Day Historical Data API
  description: Access end-of-day historical OHLCV data for stocks, ETFs, funds, indices, and currencies across global exchanges.
    Returns daily, weekly, or monthly historical price and volume data with both raw and split/dividend-adjusted closing prices.
  tags:
  - Eodhd
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: eodhd
    baseUri: https://eodhd.com/api
    description: EODHD End-Of-Day Historical Data API HTTP API.
    authentication:
      type: apikey
      in: query
      name: api_token
      value: '{{EODHD_TOKEN}}'
    resources:
    - name: eod-symbol
      path: /eod/{symbol}
      operations:
      - name: geteodhistoricaldata
        method: GET
        description: Retrieve end-of-day historical data
        inputParameters:
        - name: symbol
          in: path
          type: string
          required: true
          description: Ticker symbol with exchange suffix, e.g. AAPL.US.
        - name: api_token
          in: query
          type: string
          required: true
          description: API token assigned to your EODHD account.
        - name: fmt
          in: query
          type: string
          description: Response format. Defaults to csv.
        - name: period
          in: query
          type: string
          description: Aggregation period. d=daily, w=weekly, m=monthly.
        - name: order
          in: query
          type: string
          description: Sort order of returned rows. a=ascending, d=descending.
        - name: from
          in: query
          type: string
          description: Inclusive start date in YYYY-MM-DD format.
        - name: to
          in: query
          type: string
          description: Inclusive end date in YYYY-MM-DD format.
        - name: filter
          in: query
          type: string
          description: Return only a single field, e.g. last_close or last_volume.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: eodhd-rest
    description: REST adapter for EODHD End-Of-Day Historical Data API.
    resources:
    - path: /eod/{symbol}
      name: geteodhistoricaldata
      operations:
      - method: GET
        name: geteodhistoricaldata
        description: Retrieve end-of-day historical data
        call: eodhd.geteodhistoricaldata
        with:
          symbol: rest.symbol
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: eodhd-mcp
    transport: http
    description: MCP adapter for EODHD End-Of-Day Historical Data API for AI agent use.
    tools:
    - name: geteodhistoricaldata
      description: Retrieve end-of-day historical data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eodhd.geteodhistoricaldata
      with:
        symbol: tools.symbol
        api_token: tools.api_token
        fmt: tools.fmt
        period: tools.period
        order: tools.order
        from: tools.from
        to: tools.to
        filter: tools.filter
      inputParameters:
      - name: symbol
        type: string
        description: Ticker symbol with exchange suffix, e.g. AAPL.US.
        required: true
      - name: api_token
        type: string
        description: API token assigned to your EODHD account.
        required: true
      - name: fmt
        type: string
        description: Response format. Defaults to csv.
      - name: period
        type: string
        description: Aggregation period. d=daily, w=weekly, m=monthly.
      - name: order
        type: string
        description: Sort order of returned rows. a=ascending, d=descending.
      - name: from
        type: string
        description: Inclusive start date in YYYY-MM-DD format.
      - name: to
        type: string
        description: Inclusive end date in YYYY-MM-DD format.
      - name: filter
        type: string
        description: Return only a single field, e.g. last_close or last_volume.
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    EODHD_TOKEN: EODHD_TOKEN
