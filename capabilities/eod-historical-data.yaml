naftiko: 1.0.0-alpha2
info:
  label: EODHD End-Of-Day Historical Data API
  description: 'EODHD End-Of-Day Historical Data API. 1 operations. Lead operation: Retrieve end-of-day historical data. Self-contained
    Naftiko capability covering one Eodhd business surface.'
  tags:
  - Eodhd
  - EODHD End-Of-Day Historical Data API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EODHD_API_KEY: EODHD_API_KEY
capability:
  consumes:
  - type: http
    namespace: eod-historical-data
    baseUri: https://eodhd.com/api
    description: EODHD End-Of-Day Historical Data API business capability. Self-contained, no shared references.
    resources:
    - name: eod-symbol
      path: /eod/{symbol}
      operations:
      - name: geteodhistoricaldata
        method: GET
        description: Retrieve end-of-day historical data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: path
          type: string
          description: Ticker symbol with exchange suffix, e.g. AAPL.US.
          required: true
        - name: api_token
          in: query
          type: string
          description: API token assigned to your EODHD account.
          required: true
        - name: fmt
          in: query
          type: string
          description: Response format. Defaults to csv.
        - name: period
          in: query
          type: string
          description: Aggregation period. d=daily, w=weekly, m=monthly.
        - name: order
          in: query
          type: string
          description: Sort order of returned rows. a=ascending, d=descending.
        - name: from
          in: query
          type: string
          description: Inclusive start date in YYYY-MM-DD format.
        - name: to
          in: query
          type: string
          description: Inclusive end date in YYYY-MM-DD format.
        - name: filter
          in: query
          type: string
          description: Return only a single field, e.g. last_close or last_volume.
    authentication:
      type: apikey
      key: api_token
      value: '{{env.EODHD_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: eod-historical-data-rest
    port: 8080
    description: REST adapter for EODHD End-Of-Day Historical Data API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/eod/{symbol}
      name: eod-symbol
      description: REST surface for eod-symbol.
      operations:
      - method: GET
        name: geteodhistoricaldata
        description: Retrieve end-of-day historical data
        call: eod-historical-data.geteodhistoricaldata
        with:
          symbol: rest.symbol
          api_token: rest.api_token
          fmt: rest.fmt
          period: rest.period
          order: rest.order
          from: rest.from
          to: rest.to
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eod-historical-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for EODHD End-Of-Day Historical Data API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-end-day-historical-data
      description: Retrieve end-of-day historical data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eod-historical-data.geteodhistoricaldata
      with:
        symbol: tools.symbol
        api_token: tools.api_token
        fmt: tools.fmt
        period: tools.period
        order: tools.order
        from: tools.from
        to: tools.to
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
