                      type: string
                      description: Ticker symbol code.
                    Name:
                      type: string
                      description: Company name associated with the ticker.
                    Country:
                      type: string
                      description: Country of the exchange.
                    Exchange:
                      type: string
                      description: Exchange code.
                    Currency:
                      type: string
                      description: Currency code in which the stock is traded.
                    Type:
                      type: string
                      description: Type of ticker (e.g., Common Stock, ETF).
                    Isin:
                      type:
                      - string
                      - 'null'
                      description: ISIN code if available.
              example:
              - Code: AB
                Name: Atok Big Wedge Co Inc
                Country: Philippines
                Exchange: PSE
                Currency: PHP
                Type: Common Stock
                Isin: PHY044931210
              - Code: AC
                Name: Ayala Corp
                Country: Philippines
                Exchange: PSE
                Currency: PHP
                Type: Common Stock
                Isin: PHY0486V1154
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthorized.
