  /id-mapping:
    get:
      summary: Map between financial identifiers
      description: 'Look up securities by various identifiers including symbol, exchange code, ISIN, FIGI, LEI, CUSIP, and CIK.


        **At least one of the following filter parameters is required**:

        `filter[symbol]`, `filter[isin]`, `filter[figi]`, `filter[lei]`, `filter[cusip]`, `filter[cik]`, or `filter[ex]`.

        A request without any of these will return HTTP 422.

        '
      operationId: GetIdMapping
      parameters:
      - name: filter[symbol]
        in: query
        required: false
        description: Filter by ticker symbol (e.g., 'AAPL').
        schema:
          type: string
      - name: filter[ex]
        in: query
        required: false
        description: Filter by exchange code (e.g., 'US').
        schema:
          type: string
      - name: filter[isin]
        in: query
        required: false
        description: Filter by ISIN code (e.g., 'US0378331005').
        schema:
          type: string
      - name: filter[figi]
        in: query
        required: false
        description: Filter by FIGI identifier.
        schema:
          type: string
      - name: filter[lei]
        in: query
        required: false
        description: Filter by LEI code.
        schema:
          type: string
      - name: filter[cusip]
        in: query
        required: false
        description: Filter by CUSIP identifier.
        schema:
          type: string
      - name: filter[cik]
        in: query
        required: false
        description: Filter by CIK number.
        schema:
          type: string
      - name: page[limit]
        in: query
        required: false
        description: Number of records per page.
        schema:
          type: integer
      - name: page[offset]
        in: query
        required: false
        description: Pagination offset.
        schema:
          type: integer
      - name: fmt
        in: query
        required: false
        description: Output format.
        schema:
          type: string
          enum:
          - json
          - csv
          default: json
      responses:
        '200':
          description: Successfully retrieved identifier mappings.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    Code:
                      type: string
                      description: Ticker symbol.
                    Exchange:
                      type: string
                      description: Exchange code.
                    Name:
                      type: string
                      description: Company name.
                    ISIN:
                      type: string
                      description: ISIN code.
                    FIGI:
                      type: string
                      description: FIGI identifier.
                    LEI:
                      type: string
                      description: LEI code.
                    CUSIP:
                      type: string
                      description: CUSIP identifier.
                    CIK:
                      type: string
                      description: CIK number.
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthorized. Invalid API token.
      tags:
      - Exchanges
  /historical-market-cap/{ticker}:
    get:
      summary: Retrieve historical market capitalization data
      description: Fetches historical market capitalization for a specified stock symbol with weekly frequency.
      operationId: GetHistoricalMarketCap
      parameters:
      - name: ticker
        in: path
        required: true
        description: The ticker symbol of the stock, e.g., 'AAPL.US' or simply 'AAPL'.
        schema:
          type: string
      - name: from
        in: query
        required: false
        description: Start date for data retrieval in 'YYYY-MM-DD' format.
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        description: End date for data retrieval in 'YYYY-MM-DD' format.
        schema:
          type: string
          format: date
      - name: reverse
        in: query
        required: false
        description: Set to 'true' to reverse sort order (newest first).
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      - name: fmt
        in: query
        required: false
        description: Output format, either 'json' or 'csv'. Defaults to 'json'.
        schema:
          type: string
          enum:
          - json
          - csv
          default: json
      responses:
        '200':
          description: 'Successfully retrieved historical market capitalization data.


            The response is a JSON object whose keys are sequential integer indices (as strings: "0", "1", "2", ...) and whose values are objects containing `date` and `value`. Iterate over the values, not the keys.

            '
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date
                      description: The date of the market capitalization value.
                    value:
                      type: number
                      description: Market capitalization value in USD.
                  required:
                  - date
                  - value
              example:
                '0':
                  date: '2022-06-07'
                  value: 2406898266500
                '1':
                  date: '2022-06-14'
                  value: 2148744629600
                '2':
                  date: '2022-06-21'
                  value: 2199080542500
                '3':
                  date: '2022-06-28'
                  value: 2212148752300
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthorized. Invalid API token.
        '404':
          description: Market capitalization data not found for the specified ticker or date range.
      tags:
      - Market Data
  /insider-transactions:
    get:
      summary: Retrieve insider transaction data
      description: Fetch insider transaction data for US-listed companies. Covers insider buys and sells, providing transaction details such as date, shares, and price.
      operationId: GetInsiderTransactions
      parameters:
      - name: limit
        in: query
        required: false
        description: Max number of entries per result, from 1 to 1000. Default is 100.
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
      - name: from
        in: query
        required: false
        description: 'Start date for transactions (format: YYYY-MM-DD). Defaults to one year before current date.'
        schema:
          type: string
          format: date
      - name: to
        in: query
        required: false
        description: 'End date for transactions (format: YYYY-MM-DD). Defaults to current date.'
        schema:
          type: string
          format: date
      - name: code
        in: query
        required: false
        description: Ticker symbol for filtering results (e.g., 'AAPL.US'). If omitted, returns data for all symbols.
        schema:
          type: string
      - name: fmt
        in: query
        required: false
        description: Output format (only 'json' supported).
        schema:
          type: string
          enum:
          - json
          default: json
      responses:
        '200':
          description: Successful response with insider transaction data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      description: Ticker symbol of the company
                    exchange:
                      type: string
                      description: Exchange where the stock is listed
                    date:
                      type: string
                      format: date
                      description: Report date of the transaction
                    reportDate:
                      type: string
                      format: date
                      description: Date the transaction was reported to the SEC
                    ownerCik:
                      type:
                      - string
                      - 'null'
                      description: Unique identifier for the owner in SEC filings
                    ownerName:
                      type: string
                      description: Name of the insider who executed the transaction
                    ownerRelationship:
                      type:
                      - string
                      - 'null'
                      description: Relationship of the owner to the company (e.g., Director)
                    ownerTitle:
                      type: string
                      description: Title or role of the insider in the company
                    transactionDate:
                      type: string
                      format: date
                      description: Date when the transaction occurred
                    transactionCode:
                      type: string
                      enum:
                      - P
                      - S
                      description: 'Type of transaction: ''P'' for Purchase, ''S'' for Sale'
                    transactionAmount:
                      type: integer
                      description: Number of shares involved in the transaction
                    transactionPrice:
                      type: number
                      format: float
                      description: Price per share at the time of the transaction
                    transactionAcquiredDisposed:
                      type: string
                      enum:
                      - A
                      - D
                      description: Indicates whether securities were Acquired (A) or Disposed (D)
                    postTransactionAmount:
                      type:
                      - integer
                      - 'null'
                      description: Total number of shares held by the insider post-transaction
                    link:
                      type: string
                      format: uri
                      description: Link to the original SEC filing document
              examples:
                example1:
                  summary: Sample insider transaction data
                  value:
                  - code: AAPL
                    exchange: US
                    date: '2023-03-09'
                    reportDate: '2023-03-13'
                    ownerCik: 0000320193
                    ownerName: Tim Cook
                    ownerRelationship: CEO
                    ownerTitle: CEO
                    transactionDate: '2023-03-09'
                    transactionCode: P
                    transactionAmount: 5000
                    transactionPrice: 120.5
                    transactionAcquiredDisposed: A
                    postTransactionAmount: 5000
                    link: https://www.sec.gov/Archives/edgar/data/0000320193/000141588922012089/xslF345X03/form4.xml
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthorized access, invalid or missing API token.
        '404':
          description: No insider transaction data found for the specified criteria.
      tags:
      - Corporate Actions
  /internal-user:
    get:
      summary: Retrieve internal user account information
