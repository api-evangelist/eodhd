        in: query
        required: false
        description: Start UNIX timestamp (UTC).
        schema:
          type: integer
          format: int64
      - name: to
        in: query
        required: false
        description: End UNIX timestamp (UTC).
        schema:
          type: integer
          format: int64
      - name: limit
        in: query
        required: false
        description: Maximum number of ticks to return.
        schema:
          type: integer
      - name: fmt
        in: query
        required: false
        description: Output format.
        schema:
          type: string
          enum:
          - json
          default: json
      responses:
        '200':
          description: Successfully retrieved tick data.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timestamp:
                      type: integer
                      format: int64
                      description: Trade timestamp in milliseconds since epoch.
                    price:
                      type: number
                      description: Trade price.
                    volume:
                      type: integer
                      description: Number of shares traded.
                    exchange:
                      type: string
                      description: Exchange code where trade occurred.
                    conditions:
                      type: string
                      description: Trade condition codes.
