                - Bulk Splits and Dividends API
                - Fundamental Data
                - Bond Fundamentals API
                - Stock Options Data
                - News API
                - commodities
                - sec_filings
                - id_mapping
                - Technical API Data
                - Intraday Data API
                - EOD Historical Data
                - Search API
                - dividends
                - Dividends Data Feed
                - Split Data Feed
                - Calendar Data
                - Live (delayed) Data API
                - CBOE Data API
                - Real-time Data via WebSockets
                - Economic Events API
                - Sentiment Data API
                - Tick Data
                - Exchanges List API
                availableMarketplaceDataFeeds:
                  dailyRateLimit: 100000
                  requestsSpent: 30
                  timeToReset: 08:53 GMT+0000
                  subscriptions:
                  - US Stock Options Data API
        '400':
          description: Invalid request parameters.
        '401':
          description: Unauthorized. The API token is missing, invalid, or expired.
        '404':
          description: User not found.
      tags:
      - User
  /intraday/{ticker}:
    get:
      summary: Retrieve intraday historical price data
      description: Retrieve intraday historical stock data for a specific ticker.
      operationId: GetIntradayHistoricalData
      parameters:
      - name: ticker
        in: path
        required: true
        description: Ticker symbol with exchange code (e.g., 'AAPL.US').
        schema:
          type: string
      - name: interval
        in: query
        required: true
        description: Interval for data points. Options are '1m' (1 minute), '5m' (5 minutes), '15m' (15 minutes), '30m' (30 minutes), and '1h' (1 hour).
        schema:
          type: string
          enum:
          - 1m
          - 5m
          - 15m
          - 30m
          - 1h
      - name: fmt
        in: query
        required: false
        description: Response format. Defaults to CSV if not specified. Options are 'json' and 'csv'.
        schema:
          type: string
          enum:
          - json
          - csv
      - name: from
        in: query
        required: false
        description: Start datetime in Unix timestamp (UTC). For example, 1627896900 for '2021-08-02 09:35:00'.
        schema:
          type: integer
      - name: to
        in: query
        required: false
        description: End datetime in Unix timestamp (UTC). For example, 1630575300 for '2021-09-02 09:35:00'.
        schema:
          type: integer
      responses:
        '200':
          description: Successful response with intraday historical stock data.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timestamp:
                      type: integer
                    gmtoffset:
                      type: integer
                    datetime:
                      type: string
                    open:
                      type: number
                    high:
                      type: number
                    low:
                      type: number
                    close:
                      type: number
                    volume:
                      type:
                      - integer
                      - 'null'
              example:
              - timestamp: 1628876100
                gmtoffset: 0
                datetime: '2021-08-13 17:35:00'
                open: 148.929992
                high: 149.059997
                low: 148.929992
