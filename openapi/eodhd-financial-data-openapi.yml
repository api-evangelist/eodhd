                      MarketCapitalization:
                        type: number
                      EBITDA:
                        type: number
                      PERatio:
                        type: number
                  Valuation:
                    type: object
                    description: Company valuation metrics
                    properties:
                      TrailingPE:
                        type: number
                      ForwardPE:
                        type: number
                      EnterpriseValue:
                        type: number
                  SharesStats:
                    type: object
                    description: Shares statistics
                    properties:
                      SharesOutstanding:
                        type: number
                      SharesFloat:
                        type: number
                      PercentInstitutions:
                        type: number
                  Technicals:
                    type: object
                    description: Technical indicators
                    properties:
                      Beta:
                        type: number
                      52WeekHigh:
                        type: number
                      52WeekLow:
                        type: number
                  SplitsDividends:
                    type: object
                    description: Dividend and split information
                    properties:
                      DividendYield:
                        type: number
                      DividendDate:
                        type: string
                        format: date
                      LastSplitFactor:
                        type: string
                  AnalystRatings:
                    type: object
                    description: Analyst ratings
                    properties:
                      Rating:
                        type: number
                      StrongBuy:
                        type: integer
                      Sell:
                        type: integer
                  Holders:
                    type: object
                    description: Institutional and fund holders
                    properties:
                      Institutions:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            totalShares:
                              type: number
                      Funds:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            totalShares:
                              type: number
                  InsiderTransactions:
