      description: Start date (YYYY-MM-DD).
      schema:
        type: string
        format: date
    DateTo:
      name: to
      in: query
      required: false
      description: End date (YYYY-MM-DD).
      schema:
        type: string
        format: date
  responses:
    UnauthorizedHtml:
      description: Unauthorized.
      content:
        text/html:
          schema:
            type: string
    ForbiddenHtml:
      description: Forbidden.
      content:
        text/html:
          schema:
            type: string
    NotFoundHtml:
      description: Not Found.
      content:
        text/html:
          schema:
            type: string
    TooManyHtml:
      description: Too Many Requests.
      content:
        text/html:
          schema:
            type: string
      headers:
        X-RateLimit-Limit:
          description: Requests per minute limit.
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in the current window.
          schema:
            type: integer
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
  schemas:
