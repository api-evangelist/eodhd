        required: false
        description: Aggregate metric to return.
        schema:
          type: string
          enum:
          - gross_notional
      - name: filter[dimension]
        in: query
        required: false
        description: Breakdown dimension.
        schema:
          type: string
          enum:
          - grade
          - cleared_status
      - name: filter[value]
        in: query
        required: false
        description: Filter by the value of the breakdown dimension.
        schema:
          type: string
      - name: filter[region]
        in: query
        required: false
        description: Filter by region.
        schema:
          type: string
      - name: filter[from]
        in: query
        required: false
        description: Start date (YYYY-MM-DD).
        schema:
          type: string
          format: date
      - name: filter[to]
        in: query
        required: false
        description: End date (YYYY-MM-DD).
        schema:
          type: string
          format: date
      - name: page[offset]
        in: query
        required: false
        description: Pagination offset (records to skip).
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: page[limit]
        in: query
        required: false
        description: Number of records per page. Default 20, maximum 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: fmt
        in: query
        required: false
        description: Output format.
        schema:
          type: string
          enum:
          - json
          - csv
          default: json
      responses:
        '200':
          description: Successfully retrieved CDS market aggregates.
          content:
            application/json:
              schema:
                type: object
                required:
                - meta
                - data
                - links
                properties:
                  meta:
                    type: object
                    description: Pagination and field metadata.
                    required:
                    - total
                    - fields
                    properties:
                      offset:
                        type: integer
                        minimum: 0
                      limit:
                        type: integer
                        minimum: 1
                      total:
                        type: integer
                        minimum: 0
                      fields:
                        type: array
                        items:
                          type: string
                      compact:
                        type:
                        - boolean
                        - 'null'
                    additionalProperties: false
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        as_of_date:
                          type: string
                          format: date-time
                          description: As-of timestamp for the aggregate.
                        release_date:
                          type: string
                          format: date-time
                          description: Release timestamp of the aggregate.
                        metric:
                          type: string
                          description: Aggregate metric name.
                        breakdown_dimension:
                          type: string
                          description: Dimension used for the breakdown.
                        breakdown_value:
                          type: string
                          description: Value of the breakdown dimension.
                        region:
                          type: string
                          description: Region.
                        usd_notional_mn:
                          type: number
                          description: Notional amount in USD millions.
                        source:
                          type: string
                          description: Data source.
                  links:
                    type: object
                    required:
                    - next
                    properties:
                      next:
                        type:
                        - string
                        - 'null'
                        description: URL to fetch the next page, or null if last page.
                    additionalProperties: false
                additionalProperties: false
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                  message:
                    type: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                  message:
                    type: string
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                  message:
                    type: string
        '422':
          description: 'Validation error. Returned when a parameter is malformed or a filter value is invalid.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                  message:
                    type: string
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  error:
                    type: string
                  message:
                    type: string
      tags:
      - Credit & Sovereign Risk
