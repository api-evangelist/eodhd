                    description: Insider transactions
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        ownerName:
                          type: string
                        transactionCode:
                          type: string
                        transactionAmount:
                          type: number
                  ESGScores:
                    type: object
                    description: Environmental, social, and governance scores
                    properties:
                      environmentScore:
                        type: number
                      socialScore:
                        type: number
                      governanceScore:
                        type: number
