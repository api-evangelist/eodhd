          description: Type of subscription plan.
        paymentMethod:
          type: string
          description: Payment processor used for the subscription (e.g., Stripe, PayPal).
        apiRequests:
          type: integer
          description: Number of API requests in the current day.
        apiRequestsDate:
          type: string
          format: date
          description: Date of the current counter period (UTC).
        dailyRateLimit:
          type: integer
          description: Daily request limit for standard APIs.
        extraLimit:
          type: integer
          description: Extra daily limit granted (if any).
        inviteToken:
          type:
          - string
          - 'null'
          description: Referral invite token, if available.
        inviteTokenClicked:
          type: integer
          description: Clicks on the invite token link.
        subscriptionMode:
          type: string
          enum:
          - paid
          - free
          - trial
        availableDataFeeds:
          type: array
          items:
            type: string
          description: List of standard data feeds accessible.
