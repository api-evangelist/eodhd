specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: EODHD
providerId: eodhd
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Financial
  - Market Data
description: 'FOCUS-aligned FinOps for EODHD: flat per-product subscriptions (monthly or annual) plus
  a custom-priced commercial-use plan; usage is bounded by daily/per-minute call quotas rather than per-call
  charges.'
sources:
  - https://eodhd.com/pricing
  - https://eodhd.com/financial-apis/api-for-historical-data-and-volumes
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: EOD Historical Data Ltd
serviceCategory: Market Data
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Refund
    - Credit
focusColumns:
  ServiceName: EODHD
  ServiceCategory: Market Data
  ProviderName: EODHD
  PublisherName: EOD Historical Data Ltd
  InvoiceIssuerName: EOD Historical Data Ltd
  BillingCurrency: USD
meters:
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - product
      - billing_period
  - name: api_calls_daily
    unit: request
    aggregation: sum
    dimensions:
      - api_token
      - endpoint
  - name: api_tokens_active
    unit: token
    aggregation: count
principles:
  - name: Visibility
    description: Track per-token call usage against the 100,000/day and 1,000/min ceilings via the EODHD
      account dashboard; export billing receipts monthly.
  - name: Allocation
    description: Issue a separate API token per consuming application or team so daily call usage is
      attributable.
  - name: Optimization
    description: Use the bulk historical-series endpoint (one call covers a full ticker history) to minimize
      call count; cache static fundamentals locally; choose annual billing for ~17% discount.
  - name: Accountability
    description: A single account owner pays the subscription; usage and renewal cadence should be reviewed
      against ticker coverage actually consumed.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
