specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: EODHD
providerId: eodhd
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Financial
  - Market Data
description: EODHD enforces both a per-day API call ceiling (20 on free, 100,000 on paid plans) and a
  per-minute throttle of 1,000 requests. Limits are scoped per API token. A single API call covers an
  entire historical price series for one ticker, so the daily quota is more permissive than it appears.
sources:
  - https://eodhd.com/pricing
  - https://eodhd.com/financial-apis/api-for-historical-data-and-volumes
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free tier daily call ceiling
    scope: api-token
    metric: requests
    limit: 20
    timeFrame: day
    notes: One-time welcome bonus of 500 calls is added to the first day of the account.
  - name: Paid tier daily call ceiling
    scope: api-token
    metric: requests
    limit: 100000
    timeFrame: day
  - name: Per-minute throttle (all tiers)
    scope: api-token
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
policies:
  - name: Single-call historical series
    description: A request for an entire price history for a ticker counts as a single call regardless
      of date range, so the daily ceiling is generous for historical analysis.
  - name: Token scope
    description: All limits are tracked at the API token level; sharing tokens across applications consumes
      a shared budget.
  - name: Commercial use
    description: Commercial usage requires the Startups & Enterprise plan; consumer plans are licensed
      for personal use only.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
