description: >-
  Access historical end-of-day stock prices, intraday data, US stock options, and real-time prices with free and
  advanced plans. EODHD provides financial data for 150,000+ tickers, including stocks, ETFs, funds, and currencies
  worldwide, through 68+ REST endpoints, WebSocket streaming, an official OpenAPI 3.1.0 specification, an OAuth-secured
  MCP server with 86 tools, and a published Claude Skills plugin.
apis:
