  baseURL: https://eodhd.com/api
  properties:
  - url: https://eodhd.com/financial-apis/live-realtime-stocks-api
    type: Documentation
  description: >-
    Returns live or 15-20 minute delayed stock quotes including last price, change, volume, and bid/ask
    data for stocks, ETFs, indices, and forex pairs across global exchanges.
