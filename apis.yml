  baseURL: https://eodhd.com/api
  properties:
  - url: https://eodhd.com/financial-apis/intraday-historical-data-api
    type: Documentation
  description: >-
    Provides intraday historical OHLCV data at 1-minute, 5-minute, and 1-hour intervals for US stocks
    and other supported markets, with multi-year lookbacks depending on the resolution.
