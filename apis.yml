  humanURL: https://eodhd.com/financial-apis/
  baseURL: https://eodhd.com/api
  description: >-
    The full EODHD REST surface — 83 operations across end-of-day and intraday prices, fundamentals, calendars,
    news and sentiment, options, indices, screening, macro and credit-risk data, sanctions, ESG, and marketplace
    analytics — captured from the provider's official OpenAPI 3.1.0 specification.
